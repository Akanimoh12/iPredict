name: iPredict CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Frontend lint, test, and build ──────────────────────────────────
  lint-test-build:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 7

  # ── Job 2: Clarity contract check & test ────────────────────────────────────
  contract-check:
    name: Contracts (Clarinet)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Clarinet
        run: |
          curl -sL https://raw.githubusercontent.com/hirosystems/clarinet/main/scripts/install.sh | sh
          echo "${HOME}/.clarinet/bin" >> $GITHUB_PATH

      - name: Check contracts compile
        working-directory: contracts
        run: yes | clarinet check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install test dependencies
        working-directory: contracts
        run: npm ci

      - name: Run unit & integration tests
        working-directory: contracts
        run: npx vitest run
